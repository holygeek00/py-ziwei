<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗数分析报告生成器 | Zi Wei Dou Shu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37;
            --primary-gold-hover: #f1c40f;
            --bg-dark: #0f0c29;
            --bg-mid: #302b63;
            --bg-light: #24243e;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --glass-bg: rgba(25, 25, 35, 0.6);
            --glass-border: rgba(212, 175, 55, 0.2);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid), var(--bg-light));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient glowing orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
        body::before {
            top: -100px;
            left: -100px;
            background: #8e2de2;
        }
        body::after {
            bottom: -100px;
            right: -100px;
            background: #4a00e0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            text-align: center;
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 2px;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            font-family: -apple-system, sans-serif;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 400;
            color: var(--text-muted);
            font-family: -apple-system, sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }
        
        /* Fix select dropdown color issues in some browsers */
        select option {
            background-color: var(--bg-mid);
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--primary-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        /* Color-scheme for date inputs */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.7);
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-gold);
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: -apple-system, sans-serif;
            position: relative;
            overflow: hidden;
        }

        #generateBtn {
            background: linear-gradient(135deg, #d4af37 0%, #b5952f 100%);
            color: #1a1a24;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, #f1c40f 0%, #d4af37 100%);
        }

        #generateBtn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #downloadBtn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        #downloadBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .preview-area {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        .preview-area::-webkit-scrollbar {
            width: 8px;
        }
        .preview-area::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .preview-area::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 4px;
        }

        .preview-area h3 {
            color: var(--primary-gold);
            margin-top: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: -apple-system, sans-serif;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Two columns layout for certain fields */
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>紫微鬥數</h1>
    <p class="subtitle">PROFESSIONAL DESTINY ANALYSIS</p>
    
    <form id="reportForm">
        <div class="form-row">
            <div class="form-group">
                <label for="date_str">出生日期 (YYYY-MM-DD)</label>
                <input type="date" id="date_str" name="date_str" required>
            </div>
            
            <div class="form-group">
                <label for="time_index">出生時辰</label>
                <select id="time_index" name="time_index">
                    <option value="0">子時 (23:00 - 01:00)</option>
                    <option value="1">丑時 (01:00 - 03:00)</option>
                    <option value="2">寅時 (03:00 - 05:00)</option>
                    <option value="3">卯時 (05:00 - 07:00)</option>
                    <option value="4">辰時 (07:00 - 09:00)</option>
                    <option value="5">巳時 (09:00 - 11:00)</option>
                    <option value="6">午時 (11:00 - 13:00)</option>
                    <option value="7">未時 (13:00 - 15:00)</option>
                    <option value="8">申時 (15:00 - 17:00)</option>
                    <option value="9">酉時 (17:00 - 19:00)</option>
                    <option value="10">戌時 (19:00 - 21:00)</option>
                    <option value="11">亥時 (21:00 - 23:00)</option>
                    <option value="12">晚子時 (23:00 - 24:00)</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="gender">性別</label>
                <select id="gender" name="gender">
                    <option value="男">男 (Male)</option>
                    <option value="女">女 (Female)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="date_type">曆法</label>
                <select id="date_type" name="date_type">
                    <option value="solar">公曆 (陽曆)</option>
                    <option value="lunar">農曆 (陰曆)</option>
                </select>
            </div>
        </div>
        
        <div class="form-group checkbox-group" id="leap_group" style="display: none;">
            <input type="checkbox" id="is_leap_month" name="is_leap_month">
            <label for="is_leap_month" style="margin: 0; color: #fff; cursor: pointer;">此月為閏月 (Leap Month)</label>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="language">報告語言</label>
                <select id="language" name="language">
                    <option value="zh-CN">簡體中文 (Simplified Chinese)</option>
                    <option value="zh-TW">繁體中文 (Traditional Chinese)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="target_date">目標分析日期 (可選)</label>
                <input type="date" id="target_date" name="target_date">
            </div>
        </div>
        
        <div class="button-group">
            <button type="submit" id="generateBtn">🔮 生成深度解析</button>
            <button type="button" id="downloadBtn" onclick="downloadMd()">💾 儲存為 Markdown</button>
        </div>
    </form>

    <div class="preview-area" id="previewArea" style="display: none;">
        <h3>✨ 命盤與運勢解析</h3>
        <pre><code id="preview"></code></pre>
    </div>
</div>

<script>
    let markdownContent = "";

    // 判斷是否顯示「閏月」勾選框
    document.getElementById("date_type").addEventListener("change", function(e) {
        if (e.target.value === "lunar") {
            document.getElementById("leap_group").style.display = "flex";
        } else {
            document.getElementById("leap_group").style.display = "none";
            document.getElementById("is_leap_month").checked = false;
        }
    });

    document.getElementById("reportForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById("generateBtn");
        btn.innerHTML = "<span style='opacity:0.7'>⏳</span> 解析命盤中...";
        btn.disabled = true;
        document.getElementById("downloadBtn").style.display = "none";
        document.getElementById("previewArea").style.display = "none";
        
        const formData = new FormData(e.target);
        const reqBody = {
            date_str: formData.get("date_str"),
            time_index: parseInt(formData.get("time_index")),
            gender: formData.get("gender"),
            date_type: formData.get("date_type"),
            is_leap_month: formData.get("is_leap_month") === "on",
            target_date: formData.get("target_date") || "",
            language: formData.get("language")
        };
        
        try {
            const res = await fetch("/api/report/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(reqBody)
            });
            
            if (res.ok) {
                markdownContent = await res.text();
                document.getElementById("preview").innerText = markdownContent;
                document.getElementById("previewArea").style.display = "block";
                document.getElementById("downloadBtn").style.display = "block";
            } else {
                const err = await res.json();
                alert("生成失敗: " + (err.detail || "未知錯誤"));
            }
        } catch (error) {
            alert("網絡錯誤: " + error.message);
        } finally {
            btn.innerHTML = "🔮 生成深度解析";
            btn.disabled = false;
        }
    });

    function downloadMd() {
        if (!markdownContent) return;
        const blob = new Blob([markdownContent], {type: "text/markdown"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        const dateStr = document.getElementById("date_str").value;
        const lang = document.getElementById("language").value;
        if (lang === "zh-TW") {
            a.download = `紫微鬥數報告_${dateStr}.md`;
        } else {
            a.download = `紫微斗数报告_${dateStr}.md`;
        }
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
